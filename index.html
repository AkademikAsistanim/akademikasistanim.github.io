<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akademik İzlence Platformu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@700&display=swap');

        :root {
            --theme-brightness: 1; 
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw;
            transition: background 0.5s ease, color 0.5s ease;
        }

        .theme-container {
            filter: brightness(var(--theme-brightness));
            height: 100vh; width: 100vw;
            transition: filter 0.3s ease;
            position: relative;
        }

        #brightness-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999990; background-color: black; opacity: 0;
            transition: opacity 0.3s ease, background-color 0.3s ease;
        }

        /* --- SİNEMATİK ARKA PLANLAR --- */
        .cinematic-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: linear-gradient(90deg, #bef264 0%, #a7f3d0 35%, #64748b 65%, #0f172a 100%); }
        body.theme-nature .cinematic-bg { display: block; }
        .hills { position: absolute; bottom: -80px; left: 0; width: 55%; height: 250px; background: #84cc16; border-radius: 100% 100% 0 0; opacity: 0.5; }
        .sun { position: absolute; top: 5%; left: 10%; width: 100px; height: 100px; background: radial-gradient(circle, rgba(253,224,71,0.8) 0%, rgba(253,224,71,0) 70%); animation: sun-glow 6s infinite alternate; }
        @keyframes sun-glow { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.15); opacity: 0.85; } }

        .hp-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: linear-gradient(to bottom, #0f172a, #1e1b4b); }
        body.theme-harrypotter .hp-bg { display: block; }
        .hp-lightning { position: absolute; top: 0; left: 40%; width: 2px; height: 100vh; background: #fff; box-shadow: 0 0 20px #fff, 0 0 40px #fff; opacity: 0; transform: rotate(15deg); animation: lightning 8s infinite; }
        @keyframes lightning { 0%, 95%, 100% { opacity: 0; } 96%, 98% { opacity: 1; } 97% { opacity: 0; } }
        .hp-castle { position: absolute; bottom: 0; right: 5%; width: 300px; height: 250px; background: #020617; clip-path: polygon(20% 100%, 20% 60%, 15% 60%, 25% 20%, 35% 60%, 30% 60%, 30% 100%, 50% 100%, 50% 40%, 45% 40%, 55% 10%, 65% 40%, 60% 40%, 60% 100%, 80% 100%, 80% 50%, 75% 50%, 85% 30%, 95% 50%, 90% 50%, 90% 100%); opacity: 0.8; }
        .hp-train { position: absolute; bottom: 10px; left: -100px; width: 60px; height: 20px; background: #7f1d1d; border-radius: 5px 5px 0 0; animation: hp-train-move 20s linear infinite; }
        .hp-train::before { content: ''; position: absolute; top: -15px; left: 5px; width: 15px; height: 15px; background: rgba(255,255,255,0.6); border-radius: 50%; filter: blur(4px); animation: hp-smoke 1.5s infinite; }
        @keyframes hp-train-move { 0% { transform: translateX(-100px); } 100% { transform: translateX(120vw); } }
        @keyframes hp-smoke { 0% { transform: translateY(0) scale(1); opacity: 0.8; } 100% { transform: translateY(-20px) scale(2); opacity: 0; } }

        /* ==========================================
           30 TEMA SİSTEMİ 
           ========================================== */
        body.theme-light { background: #f8fafc; color: #334155; }
        body.theme-light .glass-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        body.theme-dark { background: #0f172a; color: #f8fafc; }
        body.theme-dark .glass-card { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(51, 65, 85, 0.8); backdrop-filter: blur(12px); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        body.theme-dark .custom-input { background: rgba(15, 23, 42, 0.8); color: #fff; border-color: #334155; }
        body.theme-nature { color: #1e293b; }
        body.theme-nature .glass-card { background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        body.theme-gastronomy { background-color: #fff7ed; background-image: linear-gradient(#fed7aa 1px, transparent 1px), linear-gradient(90deg, #fed7aa 1px, transparent 1px); background-size: 30px 30px; color: #7c2d12; }
        body.theme-gastronomy .glass-card { background: rgba(255, 237, 213, 0.95); border: 2px solid #fdba74; box-shadow: 0 8px 25px rgba(234,88,12,0.15); backdrop-filter: blur(5px); }
        body.theme-politics { background: radial-gradient(circle at top right, #1e3a8a, #0f172a); color: #f8fafc; }
        body.theme-politics .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); border-top: 1px solid rgba(255, 215, 0, 0.3); box-shadow: 0 10px 40px rgba(0,0,0,0.3); border-radius: 0.5rem; }
        body.theme-politics .custom-input { background: rgba(0,0,0,0.2); color: #fff; border-color: rgba(255,255,255,0.2); }
        body.theme-engineering { background-color: #1e3a8a; background-image: linear-gradient(rgba(255,255,255,0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.15) 1px, transparent 1px); background-size: 20px 20px; color: #eff6ff; }
        body.theme-engineering .glass-card { background: rgba(30, 58, 138, 0.85); border: 1px solid #60a5fa; box-shadow: inset 0 0 15px rgba(96,165,250,0.2); backdrop-filter: blur(8px); border-radius: 0; }
        body.theme-engineering .custom-input { background: rgba(0,0,0,0.3); color: #fff; border-color: #3b82f6; border-radius: 0; }
        body.theme-history { background-color: #fef3c7; background-image: radial-gradient(#d4a373 1px, transparent 1px); background-size: 15px 15px; color: #78350f; }
        body.theme-history .glass-card { background: #fffbeb; border: 2px double #d97706; box-shadow: inset 0 0 30px rgba(180,83,9,0.05); border-radius: 4px; }
        body.theme-history .custom-input { background: rgba(255,255,255,0.5); border-color: #d97706; border-radius: 4px; }
        body.theme-math { background-color: #064e3b; background-image: radial-gradient(rgba(255,255,255,0.1) 1.5px, transparent 1.5px); background-size: 25px 25px; color: #ecfdf5; }
        body.theme-math .glass-card { background: rgba(6, 78, 59, 0.8); border: 2px dashed #34d399; backdrop-filter: blur(4px); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        body.theme-math .custom-input { background: rgba(0,0,0,0.2); color: #fff; border-color: #10b981; }
        body.theme-health { background: linear-gradient(135deg, #f0fdfa 0%, #ccfbf1 100%); color: #0f766e; }
        body.theme-health .glass-card { background: #ffffff; border: 1px solid #5eead4; box-shadow: 0 15px 35px rgba(13,148,136,0.1); border-radius: 2rem; }
        body.theme-communication { background: radial-gradient(circle at 50% 0%, #f3e8ff, #e9d5ff); color: #6b21a8; }
        body.theme-communication .glass-card { background: rgba(255,255,255,0.9); border: 1px solid #d8b4fe; box-shadow: 0 10px 40px rgba(147,51,234,0.15); border-radius: 2rem; backdrop-filter: blur(10px); }
        body.theme-cat { background-color: #fff0f5; background-image: radial-gradient(#fbcfe8 2px, transparent 2px); background-size: 20px 20px; color: #831843; }
        body.theme-cat .glass-card { background: rgba(255,255,255,0.95); border: 2px dashed #f9a8d4; border-radius: 2.5rem; }
        body.theme-space { background-color: #0f172a; background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 35px 35px; color: #e2e8f0; }
        body.theme-space .glass-card { background: rgba(30,41,59,0.85); border: 1px solid #38bdf8; box-shadow: 0 0 25px rgba(56,189,248,0.15); }
        body.theme-space .custom-input { background: rgba(0,0,0,0.5); color: #fff; border-color: #38bdf8; }
        body.theme-coffee { background-color: #fef3c7; color: #451a03; }
        body.theme-coffee .glass-card { background: rgba(254,243,199,0.9); border: 1px solid #d97706; box-shadow: 0 10px 25px rgba(146,64,14,0.1); }
        body.theme-gaming { background-color: #111827; background-image: linear-gradient(#374151 1px, transparent 1px), linear-gradient(90deg, #374151 1px, transparent 1px); background-size: 20px 20px; color: #10b981; }
        body.theme-gaming .glass-card { background: rgba(17,24,39,0.95); border: 2px solid #10b981; border-radius: 0.5rem; }
        body.theme-gaming .custom-input { background: #000; color: #10b981; border-color: #10b981; border-radius: 0; }
        body.theme-music { background: linear-gradient(135deg, #e0e7ff 0%, #fae8ff 100%); color: #4338ca; }
        body.theme-music .glass-card { background: rgba(255,255,255,0.85); border: 1px solid #c7d2fe; border-radius: 3rem; }
        body.theme-botany { background-color: #ecfdf5; color: #064e3b; }
        body.theme-botany .glass-card { background: #ffffff; border: 1px solid #6ee7b7; border-left: 8px solid #10b981; }
        body.theme-ocean { background: linear-gradient(180deg, #e0f2fe 0%, #bfdbfe 100%); color: #0c4a6e; }
        body.theme-ocean .glass-card { background: rgba(255,255,255,0.8); border: 1px solid #7dd3fc; border-radius: 2rem; }
        body.theme-art { background-color: #f8fafc; background-image: radial-gradient(#fde047 2px, transparent 2px), radial-gradient(#f0abfc 2px, transparent 2px); background-size: 40px 40px, 30px 30px; background-position: 0 0, 15px 15px; color: #1e293b; }
        body.theme-art .glass-card { background: #ffffff; border: 3px solid #1e293b; box-shadow: 6px 6px 0px #f472b6; border-radius: 0; }
        body.theme-magic { background-color: #fdf4ff; color: #701a75; }
        body.theme-magic .glass-card { background: rgba(255,255,255,0.95); border: 1px solid #f0abfc; box-shadow: 0 0 30px rgba(217,70,239,0.15); border-radius: 2rem; }
        body.theme-summer { background: linear-gradient(to bottom, #fef08a, #bae6fd); color: #075985; }
        body.theme-summer .glass-card { background: rgba(255,255,255,0.9); border: 1px solid #fde047; box-shadow: 0 10px 20px rgba(234,179,8,0.1); }
        body.theme-harrypotter { color: #fef08a; }
        body.theme-harrypotter .glass-card { background: rgba(15, 23, 42, 0.85); border: 1px solid #ca8a04; box-shadow: 0 0 20px rgba(202, 138, 4, 0.15); backdrop-filter: blur(10px); }
        body.theme-harrypotter .custom-input { background: rgba(2, 6, 23, 0.6); color: #fef08a; border-color: #854d0e; }
        body.theme-lotr { background: #14532d; background-image: radial-gradient(circle at 50% 50%, #166534, #052e16); color: #fef08a; }
        body.theme-lotr .glass-card { background: rgba(20, 83, 45, 0.85); border: 2px solid #eab308; box-shadow: inset 0 0 20px rgba(234, 179, 8, 0.1); }
        body.theme-lotr .custom-input { background: rgba(0, 0, 0, 0.3); color: #fef08a; border-color: #ca8a04; }
        body.theme-got { background: #111827; background-image: linear-gradient(45deg, #7f1d1d 0%, #111827 50%, #0c4a6e 100%); color: #e2e8f0; }
        body.theme-got .glass-card { background: rgba(17, 24, 39, 0.8); border: 1px solid #475569; border-top: 3px solid #b91c1c; border-bottom: 3px solid #0284c7; }
        body.theme-got .custom-input { background: rgba(0, 0, 0, 0.5); color: #e2e8f0; border-color: #475569; }
        body.theme-astrology { background: #2e1065; background-image: radial-gradient(circle, #4c1d95 1px, transparent 1px); background-size: 30px 30px; color: #e9d5ff; }
        body.theme-astrology .glass-card { background: rgba(59, 13, 110, 0.85); border: 1px solid #d8b4fe; box-shadow: 0 0 25px rgba(216, 180, 254, 0.2); border-radius: 3rem; }
        body.theme-astrology .custom-input { background: rgba(0, 0, 0, 0.2); color: #e9d5ff; border-color: #c084fc; }
        body.theme-bjk { background: repeating-linear-gradient(45deg, #000, #000 20px, #fff 20px, #fff 40px); color: #000; }
        body.theme-bjk .glass-card { background: rgba(255, 255, 255, 0.95); border: 4px solid #000; border-radius: 0; box-shadow: 8px 8px 0px #000; }
        body.theme-bjk .custom-input { background: #f8fafc; border-color: #000; border-radius: 0; }
        body.theme-gs { background: linear-gradient(135deg, #b91c1c 50%, #facc15 50%); color: #450a0a; }
        body.theme-gs .glass-card { background: rgba(255, 255, 255, 0.95); border: 3px solid #b91c1c; border-bottom: 8px solid #facc15; }
        body.theme-gs .custom-input { background: #fffbeb; border-color: #b91c1c; }
        body.theme-fb { background: repeating-linear-gradient(90deg, #0f172a, #0f172a 50px, #facc15 50px, #facc15 100px); color: #0f172a; }
        body.theme-fb .glass-card { background: rgba(255, 255, 255, 0.95); border: 3px solid #0f172a; border-bottom: 8px solid #facc15; }
        body.theme-fb .custom-input { background: #f8fafc; border-color: #0f172a; }
        body.theme-cyan { background: #0891b2; background-image: linear-gradient(135deg, #164e63 0%, #0891b2 100%); color: #fff; }
        body.theme-cyan .glass-card { background: rgba(22, 78, 99, 0.85); border: 1px solid #67e8f9; border-top: 5px solid #ef4444; }
        body.theme-cyan .custom-input { background: rgba(0, 0, 0, 0.2); color: #fff; border-color: #22d3ee; }
        body.theme-emerald { background: #064e3b; background-image: repeating-linear-gradient(45deg, #065f46 25%, transparent 25%, transparent 75%, #065f46 75%, #065f46), repeating-linear-gradient(45deg, #065f46 25%, #064e3b 25%, #064e3b 75%, #065f46 75%, #065f46); background-position: 0 0, 20px 20px; background-size: 40px 40px; color: #ecfdf5; }
        body.theme-emerald .glass-card { background: rgba(6, 78, 59, 0.9); border: 1px solid #10b981; border-top: 4px solid #fcd34d; }
        body.theme-emerald .custom-input { background: rgba(0, 0, 0, 0.2); color: #fff; border-color: #34d399; }
        body.theme-crimson { background: #dc2626; background-image: radial-gradient(circle at 50% 0%, #ef4444, #991b1b); color: #1e293b; }
        body.theme-crimson .glass-card { background: rgba(255, 255, 255, 0.95); border: 1px solid #f87171; border-bottom: 6px solid #0f172a; }
        body.theme-crimson .custom-input { background: #f8fafc; border-color: #dc2626; }

        /* --- ORTAK UI BİLEŞENLERİ --- */
        .glass-card { transition: box-shadow 0.4s ease; border-radius: 1.5rem; }
        .custom-input { width: 100%; padding: 10px 12px; border-radius: 10px; outline: none; border: 2px solid #e2e8f0; transition: 0.3s; background: #fff; color:#1e293b; font-size: 14px; }
        .custom-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
        .btn-primary { background: #6366f1; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; text-align: center; border: none;}
        .btn-primary:hover { background: #4f46e5; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); transform: translateY(-2px); }
        .btn-danger { background: #ef4444; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; text-align: center; border: none;}
        .btn-danger:hover { background: #dc2626; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); transform: translateY(-2px); }
        .btn-outline { background: transparent; color: inherit; border: 2px solid #e2e8f0; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; text-align: center; }
        .btn-outline:hover { border-color: #6366f1; color: #6366f1; background: rgba(99, 102, 241, 0.05); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        body.theme-dark .btn-outline, body.theme-engineering .btn-outline, body.theme-space .btn-outline, body.theme-gaming .btn-outline, body.theme-got .btn-outline, body.theme-astrology .btn-outline, body.theme-harrypotter .btn-outline, body.theme-emerald .btn-outline, body.theme-cyan .btn-outline, body.theme-lotr .btn-outline { border-color: rgba(255,255,255,0.2); color: white; }
        body.theme-dark .btn-outline:hover, body.theme-engineering .btn-outline:hover, body.theme-space .btn-outline:hover, body.theme-gaming .btn-outline:hover, body.theme-got .btn-outline:hover, body.theme-astrology .btn-outline:hover, body.theme-harrypotter .btn-outline:hover, body.theme-emerald .btn-outline:hover, body.theme-cyan .btn-outline:hover, body.theme-lotr .btn-outline:hover { border-color: #818cf8; color: #818cf8; background: rgba(129, 140, 248, 0.1); }

        .screen { display: none; opacity: 0; transition: opacity 0.5s ease-in-out; }
        .screen.active { display: flex; opacity: 1; }
        .selectable-box { border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .selectable-box.selected { border-color: #6366f1; background: rgba(99, 102, 241, 0.1); transform: scale(1.05); }

        .glow-animate { animation: textGlow 2s infinite alternate; }
        @keyframes textGlow { from { text-shadow: 0 0 5px currentColor, 0 0 10px currentColor; opacity: 0.8;} to { text-shadow: 0 0 20px currentColor, 0 0 30px currentColor; opacity: 1;} }

        /* STATUS BADGES & FLAMES */
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge-done { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; } 
        .badge-pending { background: #fef9c3; color: #a16207; border: 1px solid #fde047; } 
        .badge-other { background: #e0e7ff; color: #4338ca; border: 1px solid #c7d2fe; }
        .flame-gold { color: #facc15; animation: text-burn 1.5s infinite alternate; text-shadow: 0 0 8px rgba(250, 204, 21, 0.5); }
        @keyframes text-burn { 0% { opacity: 0.8; } 100% { opacity: 1; transform: scale(1.05); } }

        /* ANA HEADER TEMA İKONLARI İÇİN */
        #header-theme-icon { position: absolute; right: -20px; bottom: -30px; font-size: 180px; opacity: 0.08; transform: rotate(15deg); pointer-events: none; transition: 0.5s; z-index: 0; }
        .font-pomodoro { font-family: 'Space Mono', monospace; }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        /* Fullscreen spinner */
        #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999999; display: none; align-items: center; justify-content: center; flex-direction: column; color: white; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 4px solid #fff; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 1rem; }

        .btn-google {
            background: white; color: #3f3f46; border: 1px solid #e4e4e7; padding: 12px 24px; border-radius: 12px;
            font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-google:hover { background: #f4f4f5; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-google img { width: 18px; height: 18px; }

        /* --- YENİ: OK (BUTON) YÖNLENDİRMELİ EKRANLAR --- */
        .dashboard-container {
            display: flex;
            overflow: hidden; /* Kaydırmayı (swipe) engeller, sadece script ile kaydırılır */
            height: 100vh;
            width: 100vw;
            position: relative;
            scroll-behavior: smooth;
        }
        .dashboard-slide {
            flex: 0 0 100vw;
            width: 100vw;
            height: 100vh;
            padding: 2rem;
            padding-bottom: 6rem; /* Alt gösterge ve butonlar için boşluk */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        
        /* Her modülün tam ekrana (full width/height) yayılmasını sağlamak için boyutlar */
        .module-full-content {
            width: 100%;
            max-width: 1400px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* --- YÖNLENDİRME BUTONLARI (SOL - SAĞ) --- */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(0,0,0,0.1);
            color: #4f46e5;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: black;
            cursor: pointer;
            z-index: 150;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }
        body.theme-dark .nav-btn, body.theme-engineering .nav-btn, body.theme-space .nav-btn, body.theme-gaming .nav-btn, body.theme-astrology .nav-btn, body.theme-harrypotter .nav-btn {
            background: rgba(15,23,42,0.7); border-color: rgba(255,255,255,0.1); color: #818cf8;
        }
        .nav-btn:hover { background: #6366f1; color: white; transform: translateY(-50%) scale(1.1); border-color: transparent;}
        .nav-btn.left { left: 1rem; }
        .nav-btn.right { right: 1rem; }
        .nav-btn:disabled { opacity: 0; pointer-events: none; }

        /* --- SAYFA GÖSTERGELERİ (DOTS) --- */
        .slide-dots {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 100;
            background: rgba(0,0,0,0.1);
            padding: 8px 12px;
            border-radius: 20px;

        window.nextScreen = function(targetId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            const target = document.getElementById(targetId);
            if(target) target.classList.add('active');
        }

        window.selectTheme = function(themeName, element) {
            document.body.className = themeName;
            state.theme = themeName;
            if(element) { window.renderInitialThemes(); } 
            else { window.renderDashboard(); }
            window.saveDataToCloud();
        }

        window.changeThemeBrightness = function(value) {
            state.themeBrightness = value;
            const overlay = document.getElementById('brightness-overlay');
            if (overlay) {
                if (value < 1) { overlay.style.backgroundColor = 'black'; overlay.style.opacity = 1 - value; } 
                else if (value > 1) { overlay.style.backgroundColor = 'white'; overlay.style.opacity = (value - 1) * 0.5; } 
                else { overlay.style.opacity = 0; }
            }
            window.saveDataToCloud();

        window.saveProjectName = function() {

        window.finishSetup = function() {

        // YENİ: OK (BUTON) İLE SAYFA DEĞİŞTİRME MANTIĞI

                                </div>
                            </div>`;
            });

            setHtml += `<div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 flex justify-between items-center opacity-70 mt-6">
                            <span class="font-bold text-base">⚙️ Ayarlar & Düzenleme</span>
                            <span class="text-sm font-black">Sayfa ${totalSlides} (Sabit)</span>
                        </div>
                        
                        <div class="mt-10">
                            <h3 class="text-base font-black text-slate-500 mb-4 uppercase tracking-widest border-b border-slate-200 pb-2">➕ Araç Ekle (Pasif Olanlar)</h3>
                            <div id="settings-avail-modules" class="space-y-3">`;
            
            const inactive = state.modules.filter(m => !state.activeModules.some(active => active.id === m.id));
            if(inactive.length === 0) setHtml += `<p class="text-sm opacity-50 font-bold p-6 bg-black/5 rounded-2xl text-center">Tüm araçlar sayfalarınızda ekli.</p>`;
            inactive.forEach(m => {

                            </div>`;

            setHtml += `    </div>

                                <div><label class="text-xs font-black uppercase opacity-60 text-indigo-600 ml-1">Başlık Rengi</label><input type="color" id="set-proj-color" class="w-full h-12 rounded-xl cursor-pointer border-0 p-0 shadow-sm mt-2 block" value="${state.projectColor}" onchange="updateGlobalSettings()"></div>

                                <label class="text-xs font-black uppercase opacity-60 text-indigo-600 block mb-3 ml-1">Tema Parlaklığı</label>

                                    <span class="text-2xl">🌘</span>
                                    <input type="range" min="0.5" max="1.5" step="0.1" value="${state.themeBrightness || 1}" oninput="changeThemeBrightness(this.value)" class="w-full cursor-pointer accent-indigo-600">
                                    <span class="text-2xl">☀️</span>
                                </div>
                            </div>
                            <div class="pt-4">
                                <label class="text-xs font-black uppercase opacity-60 text-indigo-600 block mb-3 ml-1">Tema Değiştir</label>
                                <div class="grid grid-cols-3 sm:grid-cols-4 gap-3 text-xs max-h-64 overflow-y-auto custom-scroll p-2 border border-black/10 rounded-2xl bg-white/50 dark:bg-slate-800/50">`;
                                
            ALL_THEMES.forEach(t => {
                let bClass = state.theme === t.id ? 'border-indigo-600 bg-indigo-100 text-indigo-800 shadow-md dark:bg-indigo-900/80 dark:text-indigo-100 scale-105 transform' : 'border-black/10 opacity-70 hover:opacity-100 bg-white dark:bg-slate-700 hover:scale-105 transform';
                setHtml += `<div onclick="selectTheme('${t.id}', false)" class="p-3 border-2 rounded-xl cursor-pointer font-bold text-center transition-all ${bClass} flex flex-col items-center gap-2">
                                <span class="text-2xl">${t.icon}</span><span class="truncate w-full">${t.name}</span>
                            </div>`;

            setHtml += `        </div>

        // Genel Ayarları Input'tan anlık güncelleme
        window.updateGlobalSettings = function() {
            const name = document.getElementById('set-proj-name').value;
            if(name.trim()) state.projectName = name;
            state.projectColor = document.getElementById('set-proj-color').value;
            
            // İlk slayttaki başlığı bulup anlık güncelle

            }
            window.saveDataToCloud();
        }

        // Listeden modül sırası değiştirme
        window.moveModuleList = function(index, direction) {
            if(index + direction < 0 || index + direction >= state.activeModules.length) return;
            const item = state.activeModules.splice(index, 1)[0];
            state.activeModules.splice(index + direction, 0, item);
            window.renderDashboard();
            window.saveDataToCloud();
            // Son slaytta (ayarlar sayfasında) kalmasını sağla
            setTimeout(() => window.goToSlide(state.activeModules.length + 1), 50); 
        }

        window.addModuleFromSettings = function(modId) {
            const mod = state.modules.find(m => m.id === modId);
            if(mod && !state.activeModules.some(m => m.id === modId)) { 
                state.activeModules.push(mod); 
                window.renderDashboard(); 
                window.saveDataToCloud();
                setTimeout(() => window.goToSlide(state.activeModules.length + 1), 50); 
            }
        }

        window.removeActiveModule = function(modId) {
            if(confirm("Bu modülü çalışma alanından (sayfalardan) kaldırmak istediğinize emin misiniz?")) {
                state.activeModules = state.activeModules.filter(m => m.id !== modId);
                const baseMod = state.modules.find(m => m.id === modId);
                if(baseMod) baseMod.selected = false;
                window.renderDashboard();
                window.closePanel();
                window.saveDataToCloud();
                setTimeout(() => window.goToSlide(state.activeModules.length + 1), 50); 
            }
        }

        // Pomodoro Fonksiyonları
        function formatPomoTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return m + ':' + s;
        }

        window.updatePomoDOM = function() {
            const display = document.getElementById('pomo-time-display');
            if(display) display.innerText = formatPomoTime(pomoState.timeLeft);
        }

        window.tickPomo = function() {
            if(pomoState.timeLeft > 0) {
                pomoState.timeLeft--;
                window.updatePomoDOM();
            } else {
                clearInterval(pomoState.interval);
                pomoState.isRunning = false;
                pomoState.isFinished = true; 
                window.renderDashboard();
                // Pomodoro sayfasını bulup oraya kaydır
                const pIdx = state.activeModules.findIndex(m => m.id === 'pomodoro');
                if(pIdx !== -1) window.goToSlide(pIdx + 1);
            }
        }

        window.togglePomo = function() {
            if(pomoState.isRunning) { clearInterval(pomoState.interval); pomoState.isRunning = false; } 
            else { pomoState.interval = setInterval(window.tickPomo, 1000); pomoState.isRunning = true; }
            window.renderDashboard();
            const pIdx = state.activeModules.findIndex(m => m.id === 'pomodoro');
            if(pIdx !== -1) window.goToSlide(pIdx + 1);
        }

        window.resetPomo = function() {
            clearInterval(pomoState.interval);
            pomoState.isRunning = false;
            pomoState.isFinished = false;
            const mod = state.activeModules.find(m => m.type === 'pomodoro');
            if(mod) {
                if(pomoState.mode === 'work') pomoState.timeLeft = mod.columns.work * 60;
                else if(pomoState.mode === 'short') pomoState.timeLeft = mod.columns.short * 60;
                else pomoState.timeLeft = mod.columns.long * 60;
            }
            window.renderDashboard();
            const pIdx = state.activeModules.findIndex(m => m.id === 'pomodoro');
            if(pIdx !== -1) window.goToSlide(pIdx + 1);
        }

        window.setPomoMode = function(mode, minutes) {
            clearInterval(pomoState.interval);
            pomoState.isRunning = false;
            pomoState.isFinished = false;
            pomoState.mode = mode;
            pomoState.timeLeft = minutes * 60;
            window.renderDashboard();
            const pIdx = state.activeModules.findIndex(m => m.id === 'pomodoro');
            if(pIdx !== -1) window.goToSlide(pIdx + 1);
        }

        window.savePomoLog = function(modId) {
            const input = document.getElementById('pomo-log-input');
            const text = input ? input.value.trim() : '';
            if (!text) { alert("Lütfen çalışmalarınızı kaydetmek için bir not girin!"); return; }

            const mod = state.activeModules.find(m => m.id === modId);
            let duration = mod.columns.work || 25;
            if (pomoState.mode === 'short') duration = mod.columns.short || 5;
            if (pomoState.mode === 'long') duration = mod.columns.long || 15;

            if(!mod.data) mod.data = [];
            mod.data.unshift({
                mode: pomoState.mode,
                duration: duration,
                text: text,
                date: new Date().toLocaleDateString('tr-TR', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'})
            });

            pomoState.isFinished = false;
            window.resetPomo(); 
            window.saveDataToCloud();
        }

        window.deletePomoLogFromPanel = function(modId, index) {
            if(confirm("Bu kaydı silmek istediğinize emin misiniz?")) {
                const mod = state.activeModules.find(m => m.id === modId);
                mod.data.splice(index, 1);
                window.openPomoAnalytics(modId);
                window.renderDashboard();
                window.saveDataToCloud();
            }
        }

        window.renderPomodoro = function(mod) {
            const workM = mod.columns.work || 25; const shortM = mod.columns.short || 5; const longM = mod.columns.long || 15;
            if(pomoState.timeLeft === 0 && !pomoState.isRunning && !pomoState.isFinished) pomoState.timeLeft = workM * 60;

            let mainContent = '';

            if (pomoState.isFinished) {
                mainContent = '<div class="w-full max-w-2xl bg-indigo-50 dark:bg-indigo-900/30 p-6 md:p-10 rounded-3xl border-2 border-indigo-200 dark:border-indigo-700 text-center animate-pulse shadow-inner">';

        window.openPomoAnalytics = function(modId) {
            const mod = state.activeModules.find(m => m.id === modId);
            if(!mod) return;

            document.getElementById('panel-title').innerText = "🍅 Pomodoro Analizi";
            
            let totalWork = 0, totalShort = 0, totalLong = 0, totalSessions = 0;
            if(mod.data) {
                mod.data.forEach(log => {
                    totalSessions++;
                    if(log.mode === 'work') totalWork += log.duration;
                    if(log.mode === 'short') totalShort += log.duration;
                    if(log.mode === 'long') totalLong += log.duration;
                });
            }

            let html = '<div class="space-y-6">';
            
            html += '<div class="grid grid-cols-2 gap-3">';
            html += '<div class="bg-indigo-50 border border-indigo-100 p-4 rounded-xl text-center"><p class="text-[10px] font-black uppercase text-indigo-600 opacity-70">Toplam Odak</p><p class="text-2xl font-black text-indigo-800">' + totalWork + '<span class="text-xs ml-1">dk</span></p></div>';
            html += '<div class="bg-emerald-50 border border-emerald-100 p-4 rounded-xl text-center"><p class="text-[10px] font-black uppercase text-emerald-600 opacity-70">Toplam Mola</p><p class="text-2xl font-black text-emerald-800">' + (totalShort + totalLong) + '<span class="text-xs ml-1">dk</span></p></div>';
            html += '<div class="col-span-2 bg-slate-50 border border-slate-200 p-4 rounded-xl flex justify-between items-center"><span class="text-xs font-bold opacity-70">Tamamlanan Oturum Sayısı:</span><span class="font-black text-lg">' + totalSessions + '</span></div>';
            html += '</div>';

            html += '<div class="border-t border-black/10 pt-4">';
            html += '<h4 class="text-sm font-black opacity-70 mb-4 flex items-center gap-2">📋 Tüm Çalışma Kayıtları</h4>';
            
            if (!mod.data || mod.data.length === 0) {
                html += '<p class="text-xs opacity-50 font-bold text-center py-4">Henüz kaydedilmiş bir çalışmanız yok.</p>';
            } else {
                html += '<div class="space-y-3">';
                mod.data.forEach((log, index) => {
                    let icon = '🍅'; let color = 'text-indigo-600';
                    if(log.mode === 'short') { icon = '☕'; color = 'text-emerald-600'; }
                    if(log.mode === 'long') { icon = '🛋️'; color = 'text-blue-600'; }
                    
                    html += '<div class="border border-black/5 p-3 rounded-xl flex justify-between items-start group hover:border-black/20 transition">';
                    html += '<div class="flex-1 pr-3">';
                    html += '<div class="text-[10px] font-black ' + color + ' uppercase mb-1 flex items-center gap-1">' + icon + ' ' + log.duration + ' Dakika <span class="opacity-40 text-slate-500 ml-1 font-normal">• ' + log.date + '</span></div>';
                    html += '<div class="text-xs font-bold opacity-80">' + log.text + '</div>';
                    html += '</div>';
                    html += '<button onclick="deletePomoLogFromPanel(\'' + mod.id + '\', ' + index + ')" class="opacity-0 group-hover:opacity-100 text-[9px] font-bold text-red-500 bg-red-50 hover:bg-red-100 px-2 py-1 rounded transition shrink-0">SİL</button>';
                    html += '</div>';
                });
                html += '</div>';
            }
            html += '</div></div>';

            document.getElementById('panel-content').innerHTML = html;
            document.getElementById('panel-footer-btn').style.display = 'none';

            document.getElementById('panel-backdrop').classList.replace('hidden', 'block');
            setTimeout(() => { document.getElementById('panel-backdrop').classList.replace('opacity-0', 'opacity-100'); }, 10);
            document.getElementById('right-panel').classList.add('open');
        }

        function getProgressStyle(val) {
            val = parseInt(val);
            if (val < 30) return { color: 'bg-red-500', anim: 'animate-pulse' };
            if (val >= 30 && val < 60) return { color: 'bg-orange-500', anim: '' };
            if (val >= 60 && val < 100) return { color: 'bg-amber-400', anim: '' };
            if (val === 100) return { color: 'bg-emerald-500', anim: 'animate-pulse shadow-[0_0_10px_rgba(16,185,129,0.8)]' };
            return { color: 'bg-indigo-500', anim: '' };
        }

        window.renderStats = function(data) {
            let tDone = 0, tTarget = 0;
            data.forEach(d => { tDone += d.completed; tTarget += d.total; });
            const overall = tTarget > 0 ? Math.round((tDone/tTarget)*100) : 0;
            
            let html = '<div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10 w-full shrink-0">';
            html += '<div class="glass-card p-6 text-center border border-black/5 bg-white/50 dark:bg-black/20"><p class="text-sm font-black uppercase opacity-60">Başarı</p><p class="text-5xl font-black flame-gold mt-2">%' + overall + '</p></div>';
            html += '<div class="glass-card p-6 text-center border border-black/5 bg-white/50 dark:bg-black/20"><p class="text-sm font-black uppercase opacity-60">Biten</p><p class="text-5xl font-black mt-2">' + tDone + '</p></div>';
            html += '<div class="glass-card p-6 text-center border border-black/5 bg-white/50 dark:bg-black/20"><p class="text-sm font-black uppercase opacity-60">Kalan</p><p class="text-5xl font-black text-indigo-600 mt-2">' + (tTarget-tDone) + '</p></div>';
            html += '<div class="glass-card p-6 text-center border border-black/5 bg-white/50 dark:bg-black/20"><p class="text-sm font-black uppercase opacity-60">Kategori</p><p class="text-5xl font-black mt-2">' + data.length + '</p></div>';
            html += '</div>';
            
            html += '<div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center flex-1 h-0 min-h-[300px] w-full">';
            html += '<div class="w-full h-full relative flex items-center justify-center p-4 bg-white/50 dark:bg-black/20 rounded-3xl border border-black/5"><canvas id="radarChart"></canvas></div>';
            html += '<div class="space-y-6 h-full overflow-y-auto pr-4 custom-scroll py-2">';
            
            data.forEach(s => {
                const perc = s.total > 0 ? Math.round((s.completed/s.total)*100) : 0;
                let bg = perc===100 ? 'bg-amber-400' : 'bg-indigo-600';
                html += '<div><div class="flex justify-between text-base font-bold mb-2 opacity-80"><span>' + s.emoji + ' ' + s.title + '</span> <span>%' + perc + '</span></div>';
                html += '<div class="h-4 bg-black/10 rounded-full overflow-hidden shadow-inner"><div class="h-full ' + bg + ' transition-all duration-1000" style="width:' + perc + '%"></div></div></div>';
            });
            html += '</div></div>';
            return html;
        }

        window.renderTasks = function(mod) {

        window.inlineUpdateInterview = function(modId, index, field, value) {
            const mod = state.activeModules.find(m => m.id === modId);
            if(mod && mod.data[index]) {
                mod.data[index][field] = value;
                window.saveDataToCloud();
            }
        }
        
        window.inlineAddInterview = function(modId) {
            const mod = state.activeModules.find(m => m.id === modId);
            if(mod) {
                mod.data.push({code:'YENİ', name:'', interviewed:false, consent:false, transcribed:false});
                window.renderDashboard();
                window.saveDataToCloud();
            }
        }
        
        window.inlineDeleteInterview = function(modId, index) {
            if(confirm('Bu kaydı silmek istediğinize emin misiniz?')) {
                const mod = state.activeModules.find(m => m.id === modId);
                if(mod && mod.data[index]) {
                    mod.data.splice(index, 1);
                    window.renderDashboard();
                    window.saveDataToCloud();
                }
            }
        }

        // --- VERİ DÜZENLEME PANELİ (Sağ Panel) ---
        window.openUnifiedPanel = function(moduleId) {
            state.editingModuleId = moduleId;
            const mod = moduleId === 'header_calendar' ? state.calendar : state.activeModules.find(m => m.id === moduleId);
            if(!mod) return;
            
            tempEditTitle = mod.title;
            tempEditData = JSON.parse(JSON.stringify(mod.data || []));
            if(mod.columns) tempEditColumns = JSON.parse(JSON.stringify(mod.columns));
            
            const container = document.getElementById('panel-content');
            let html = '<div class="mb-6 pb-6 border-b border-black/10">';
            html += '<label class="text-[10px] font-black uppercase opacity-60 ml-1 text-indigo-600">ANA MODÜL BAŞLIĞI</label>';
            html += '<input type="text" class="custom-input !py-3 mt-1 font-bold text-lg shadow-inner" value="' + tempEditTitle + '" onchange="tempEditTitle = this.value">';
            html += '</div>';

            if (mod.type === 'pomodoro') {
                html += '<div class="mb-6 pb-6 border-b border-black/10">';
                html += '<p class="text-sm opacity-70 mb-4 font-bold">⏱️ Süre Ayarları (Dakika):</p>';
                html += '<div class="grid grid-cols-3 gap-3">';
                html += '<div><label class="text-[10px] font-black uppercase opacity-60 ml-1">Odak</label><input type="number" class="custom-input !py-2 mt-1 text-center" value="' + tempEditColumns.work + '" onchange="tempEditColumns.work = parseInt(this.value)"></div>';
                html += '<div><label class="text-[10px] font-black uppercase opacity-60 ml-1">Kısa Mola</label><input type="number" class="custom-input !py-2 mt-1 text-center" value="' + tempEditColumns.short + '" onchange="tempEditColumns.short = parseInt(this.value)"></div>';
                html += '<div><label class="text-[10px] font-bold uppercase opacity-60 ml-1">Uzun Mola</label><input type="number" class="custom-input !py-2 mt-1 text-center" value="' + tempEditColumns.long + '" onchange="tempEditColumns.long = parseInt(this.value)"></div>';
                html += '</div></div>';
            }
            else if (mod.columns && Object.keys(tempEditColumns).length > 0) {
                html += '<div class="mb-6 pb-6 border-b border-black/10"><p class="text-sm opacity-70 mb-4 font-bold flex items-center gap-2">✏️ Şablon Sütun İsimleri:</p><div class="space-y-4">';
                const labels = { code:'1. Sütun (Kod)', name:'2. Sütun (İsim)', bool1:'3. Sütun (Onay 1)', bool2:'4. Sütun (Onay 2)', bool3:'5. Sütun (Onay 3)', task:'1. Sütun (Görev)', progress:'2. Sütun (İlerleme)', status:'3. Sütun (Durum)', note:'4. Sütun (Notlar)', role:'Rol Sütunu', contact:'İletişim Sütunu', ref:'Referans Sütunu', placeholder:'Günlük Soru Metni', btnText:'Günlük Buton Yazısı' };

                Object.keys(tempEditColumns).forEach(key => {
                    html += `<div><label class="text-[10px] font-black uppercase opacity-60 ml-1 text-slate-500">${labels[key] || key}</label>
                             <input type="text" class="custom-input !py-2 mt-1" value="${tempEditColumns[key]}" onchange="tempEditColumns['${key}'] = this.value"></div>`;
                });
                html += '</div></div>';
            }

            if (['calendar', 'stats', 'tasks', 'contacts'].includes(mod.type)) {
                html += '<div id="panel-data-container"></div>';
            } else if (mod.type === 'interviews') {
                html += '<div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 text-sm font-bold text-indigo-700 opacity-80 text-center">💡 Mülakat/Süreç verilerini doğrudan ana ekrandaki tablo üzerinden düzenleyebilirsiniz.</div>';
            }

            container.innerHTML = html;

            if (['calendar', 'stats', 'tasks', 'contacts'].includes(mod.type)) window.renderPanelDataRows(mod.type);

            document.getElementById('panel-footer-btn').style.display = 'block';
            let footerHtml = '<button onclick="savePanel()" class="btn-primary shadow-lg !py-4 text-lg flex-1">Tüm Değişiklikleri Kaydet</button>';
            document.getElementById('panel-footer-btn').innerHTML = '<div class="flex gap-3">' + footerHtml + '</div>';
            document.getElementById('panel-backdrop').classList.replace('hidden', 'block');
            setTimeout(() => { document.getElementById('panel-backdrop').classList.replace('opacity-0', 'opacity-100'); }, 10);
            document.getElementById('right-panel').classList.add('open');
        }

        window.renderPanelDataRows = function(type) {
            const container = document.getElementById('panel-data-container');
            if(!container) return;
            
            let html = '<p class="text-sm opacity-70 mb-4 font-bold flex items-center gap-2">📊 İçerik Verileri:</p>';
            
            if(tempEditData.length < (type === 'calendar' ? 5 : 99)) {
                html += `<button onclick="addPanelRow('${type}')" class="w-full py-3 border-2 border-dashed border-indigo-300 text-indigo-600 font-bold rounded-xl mb-4 hover:bg-indigo-50 transition">+ Yeni Veri Ekle</button>`;
            } else {
                html += '<div class="text-xs text-red-500 text-center mb-4 font-bold">Maksimum sınıra ulaştınız.</div>';
            }

            tempEditData.forEach((row, i) => {
                if(type === 'calendar') {
                    let emojis = ''; EMOJI_LIST.forEach(e => { emojis += `<option value="${e}" ${row.emoji === e ? 'selected' : ''}>${e}</option>`; });
                    html += `<div class="panel-row"><button onclick="removePanelRow(${i}, '${type}')" class="absolute top-2 right-2 text-red-500 font-bold text-xs hover:text-red-700">SİL</button>
                    <div class="grid grid-cols-4 gap-2 mt-2">
                    <div class="col-span-1"><label class="text-[10px] font-bold opacity-60">Emoji</label><select class="custom-input !py-1 !text-xl text-center" onchange="updateTemp(${i}, 'emoji', this.value)">${emojis}</select></div>
                    <div class="col-span-3"><label class="text-[10px] font-bold opacity-60">Etiket</label><input type="text" class="custom-input !py-1" value="${row.label}" onchange="updateTemp(${i}, 'label', this.value)"></div>
                    <div class="col-span-4"><label class="text-[10px] font-bold opacity-60">Hedef Tarih</label><input type="date" class="custom-input !py-1" value="${row.targetDate}" onchange="updateTemp(${i}, 'targetDate', this.value)"></div>
                    </div></div>`;
                }
                else if(type === 'stats') {
                    let emojis = ''; EMOJI_LIST.forEach(e => { emojis += `<option value="${e}" ${row.emoji === e ? 'selected' : ''}>${e}</option>`; });
                    html += `<div class="panel-row"><button onclick="removePanelRow(${i}, '${type}')" class="absolute top-2 right-2 text-red-500 font-bold text-xs hover:text-red-700">SİL</button>
                    <div class="space-y-2 mt-2">
                    <div class="flex gap-2"><select class="custom-input !py-1 w-16 !text-xl text-center" onchange="updateTemp(${i}, 'emoji', this.value)">${emojis}</select><input type="text" class="custom-input !py-1 flex-1" value="${row.title}" placeholder="Kategori Adı" onchange="updateTemp(${i}, 'title', this.value)"></div>
                    <div class="grid grid-cols-2 gap-2"><div><label class="text-[10px] font-bold opacity-60">Biten</label><input type="number" class="custom-input !py-1" value="${row.completed}" onchange="updateTemp(${i}, 'completed', parseInt(this.value))"></div><div><label class="text-[10px] font-bold opacity-60">Hedef Toplam</label><input type="number" class="custom-input !py-1" value="${row.total}" onchange="updateTemp(${i}, 'total', parseInt(this.value))"></div></div>
                    </div></div>`;
                }
                else if(type === 'tasks') {
                    html += `<div class="panel-row"><button onclick="removePanelRow(${i}, '${type}')" class="absolute top-2 right-2 text-red-500 font-bold text-xs hover:text-red-700">SİL</button>
                    <div class="space-y-2 mt-2">
                    <input type="text" class="custom-input !py-1 font-bold" value="${row.task}" placeholder="Görev Açıklaması" onchange="updateTemp(${i}, 'task', this.value)">
                    <div class="flex gap-3 items-center"><input type="range" class="w-full" min="0" max="100" step="10" value="${row.progress}" onchange="updateTemp(${i}, 'progress', parseInt(this.value))"><span class="text-[10px] font-bold w-6">%${row.progress}</span></div>
                    <div class="flex gap-2"><select class="custom-input !py-1 !text-xs flex-1" onchange="updateTemp(${i}, 'status', this.value)">
                    <option ${row.status==='Yapılmadı'?'selected':''}>Yapılmadı</option><option ${row.status==='Yapıldı'?'selected':''}>Yapıldı</option><option ${row.status==='Diğer'?'selected':''}>Diğer</option>
                    </select><input type="text" class="custom-input !py-1 !text-xs flex-1" value="${row.note||''}" placeholder="Notlar..." onchange="updateTemp(${i}, 'note', this.value)"></div>
                    </div></div>`;
                }
                else if(type === 'contacts') {
                    html += `<div class="panel-row"><button onclick="removePanelRow(${i}, '${type}')" class="absolute top-2 right-2 text-red-500 font-bold text-xs hover:text-red-700">SİL</button>
                    <div class="space-y-2 mt-2">
                    <input type="text" class="custom-input !py-1 font-bold" value="${row.name}" placeholder="Ad Soyad" onchange="updateTemp(${i}, 'name', this.value)">
                    <div class="grid grid-cols-2 gap-2"><input type="text" class="custom-input !py-1 !text-xs" value="${row.role}" placeholder="Rol" onchange="updateTemp(${i}, 'role', this.value)"><input type="text" class="custom-input !py-1 !text-xs" value="${row.contact}" placeholder="İletişim" onchange="updateTemp(${i}, 'contact', this.value)"></div>
                    <div class="grid grid-cols-2 gap-2"><input type="text" class="custom-input !py-1 !text-xs" value="${row.ref}" placeholder="Referans" onchange="updateTemp(${i}, 'ref', this.value)"><input type="text" class="custom-input !py-1 !text-xs" value="${row.note||''}" placeholder="Not" onchange="updateTemp(${i}, 'note', this.value)"></div>
                    </div></div>`;
                }
            });
            container.innerHTML = html;
        }

        window.updateTemp = function(index, field, value) { tempEditData[index][field] = value; window.renderPanelDataRows(state.editingModuleId === 'header_calendar' ? 'calendar' : state.activeModules.find(m => m.id === state.editingModuleId).type); }
        
        window.addPanelRow = function(type) {
            if(type==='calendar') tempEditData.push({emoji:'📌', label:'Yeni Hedef', targetDate: new Date().toISOString().split('T')[0]});
            if(type==='stats') tempEditData.push({title:'Yeni Kategori', completed:0, total:5, emoji:'📊'});
            if(type==='tasks') tempEditData.push({task:'Yeni Görev', progress:0, status:'Yapılmadı', note:''});
            if(type==='contacts') tempEditData.push({name:'Yeni Kişi', role:'', contact:'', ref:'', note:''});
            window.renderPanelDataRows(type);
        }

        window.removePanelRow = function(index, type) { tempEditData.splice(index, 1); window.renderPanelDataRows(type); }

        window.savePanel = function() {
            const isHeaderCal = state.editingModuleId === 'header_calendar';
            const mod = isHeaderCal ? state.calendar : state.activeModules.find(m => m.id === state.editingModuleId);
            if(mod) {
                mod.title = tempEditTitle;
                if(mod.columns) mod.columns = JSON.parse(JSON.stringify(tempEditColumns));
                if(['calendar', 'stats', 'tasks', 'contacts'].includes(mod.type)) mod.data = JSON.parse(JSON.stringify(tempEditData));
                if (mod.type === 'pomodoro' && !pomoState.isRunning) pomoState.timeLeft = mod.columns.work * 60;

                window.renderDashboard();
                window.closePanel();
                window.saveDataToCloud();
                
                // Hangi modüldeysek o sayfaya dön
                if(isHeaderCal) window.goToSlide(0);
                else {
                    const mIdx = state.activeModules.findIndex(m => m.id === mod.id);
                    if(mIdx !== -1) window.goToSlide(mIdx + 1);
                }
            }
        }

        window.closePanel = function() {
            document.getElementById('right-panel').classList.remove('open');
            document.getElementById('panel-backdrop').classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => { document.getElementById('panel-backdrop').classList.replace('block', 'hidden'); }, 300);
            state.editingModuleId = null;
        }

        // KLAVYE OK TUŞLARI İLE GEZİNME (Opsiyonel)
        document.addEventListener('keydown', (e) => {
            if(document.getElementById('screen-dashboard').classList.contains('active')) {
                // Eğer bir input alanındaysa klavye ok tuşları sayfayı değiştirmesin
                if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
                
                if (e.key === 'ArrowRight') window.slideBy(1);
                if (e.key === 'ArrowLeft') window.slideBy(-1);
            }
        });
    </script>
</body>
</html>
